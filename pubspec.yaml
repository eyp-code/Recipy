name: my_recipes
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  go_router: ^17.3.0
  google_fonts: ^8.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon.png"
  android: true
  ios: true

flutter_native_splash:
  color: "#1a1614"
  image: "assets/icon.png"
  android_12:
    color: "#1a1614"
    image: "assets/icon.png"
  ios: true
  android: true
